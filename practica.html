    <form action="/formulario_usuaruis" method="post" id="inicio"> <!--
    action es para registrar la base de datos donde se enviara la informacion registrada en el formulario

    method es para identificar de que manera se desea enviar la inforamcion del formulario 

        get enviar los valores atravez de la url 
        post envia buscando la direccion registrada en action

    ninguno de los dos es seguro para enviar datos secretos
    -->
        <label for="email"></label>
        <input type="email" id="email" name="email" placeholder="Correo"/> 
        <!--
        type identifica que tipo de atributo tiene el imput (cuadro de texto, boton, etc
        id es para identificar el imput y poder llamarlo en otras funciones
        name sera la llave que tomara el servidor al leer el formulario
        placeholder es para colocar dentro del recuadro de texto un texto indicativo
        se puede usar value para dar un valor por defecto
        --> 
        <br> <!--Salto de texto-->
        <br>
        <label for="contraseña"></label>
        <input type="password" id="contraseña" name="contraseña" placeholder="Contraseña"/>
        <br>
        <br>
        <input type="submit"> <!--submit es para que envie todos los datos registrados en el formulario a el servidor-->
    </form>

        <br>

        <textarea rows="10" cols="50" id="comentario" name="comentario"></textarea>
        <!--rows es numero de filas y cols es numero de columnas -->
        <br>
        <input type="submit"/>
    </form>
